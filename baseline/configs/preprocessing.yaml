seed: 42

data:
  root: open
  train_dir: open/train
  test_dir: open/test
  metadata: open/info.xlsx
  sample_submission: open/sample_submission.csv

features:
  time: true
  weather_summary: true
  nearest_grid: true
  thermodynamic: true
  correlation_selected_grid: false
  distance_weighted_grid: false
  power_curve_features: false
  weather_lags: false

preprocessing:
  tree:
    imputer_strategy: median
    scale: false
  neural:
    imputer_strategy: median
    scale: true

validation:
  group_1_2_train_start: "2022-01-01 01:00:00"
  group_1_2_train_end: "2024-01-01 00:00:00"
  group_3_train_start: "2023-01-01 01:00:00"
  group_3_train_end: "2024-01-01 00:00:00"
  valid_start: "2024-01-01 01:00:00"
  valid_end: "2025-01-01 00:00:00"

smoke_test:
  model:
    n_estimators: 120
    max_depth: 14
    min_samples_leaf: 8
    max_features: sqrt
    random_state: 42
    n_jobs: -1
  clip_predictions: true

postprocess:
  lower_clip: 0
  upper_clip:
    enabled: true
    kpx_group_1: 21600
    kpx_group_2: 21600
    kpx_group_3: 21000

cache_dir: baseline/cache
output_root: outputs

seed: 42
data:
  root: open
  train_dir: open/train
  test_dir: open/test
  metadata: open/info.xlsx
  sample_submission: open/sample_submission.csv
features: &features
  time: true
  weather_summary: true
  nearest_grid: true
  thermodynamic: true
  correlation_selected_grid: false
  distance_weighted_grid: false
  power_curve_features: false
  weather_lags: false
model:
  name: random_forest
  params:
    n_estimators: 120
    max_depth: 14
    min_samples_leaf: 8
    max_features: sqrt
    random_state: 42
    n_jobs: -1
postprocess:
  lower_clip: 0
  upper_clip:
    enabled: false
    kpx_group_1: 21600
    kpx_group_2: 21600
    kpx_group_3: 21000
cache_dir: baseline/cache
output_root: outputs


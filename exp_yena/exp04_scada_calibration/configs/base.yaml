seed: 42

data:
  root: open
  train_dir: open/train
  test_dir: open/test
  metadata: open/info.xlsx
  sample_submission: open/sample_submission.csv

features:
  time: true
  weather_summary: true
  nearest_grid: true
  distance_weighted_grid: true
  wind_physics: true
  thermodynamic: true
  forecast_disagreement: true
  advanced_meteorology: true

wind_physics:
  alpha_quantiles: [0.01, 0.99]
  minimum_wind_speed: 0.1
  bins_mps: [3, 7, 11, 20]

model:
  name: catboost
  params:
    iterations: 2000
    depth: 8
    learning_rate: 0.03
    subsample: 0.8
    bootstrap_type: Bernoulli
    l2_leaf_reg: 5
    random_seed: 42
    thread_count: -1

scada:
  cross_fit_blocks: 5
  forecast_wind_column: gfs__ws100__mean
  offset_smoothing: 48
  auxiliary_model_params:
    iterations: 500
    depth: 7
    learning_rate: 0.05
    loss_function: RMSE
    random_seed: 42
    task_type: GPU
    verbose: false

power_curve:
  bin_width: 0.5
  smoothing: 24

sample_weighting:
  low_generation_weight: 0.25

two_stage:
  probability_threshold: 0.5
  classifier_params:
    iterations: 500
    depth: 7
    learning_rate: 0.05
    loss_function: Logloss
    random_seed: 42
    task_type: GPU
    verbose: false

experiment:
  lead_interactions: false
  direction_features: false
  scada_offset: false
  predicted_scada: false
  power_curve: false
  sample_weighting: false
  two_stage: false

use_feature_drop: true
feature_drop_list: experiments/exp02_catboost_feature/configs/dropped_features_list.txt
require_gpu: true
final_iteration_multiplier: 1.0

postprocess:
  lower_clip: 0
  upper_clip:
    enabled: false
    kpx_group_1: 21600
    kpx_group_2: 21600
    kpx_group_3: 21000

cache_dir: baseline/cache
output_root: experiments/exp04_scada_calibration/outputs/base
